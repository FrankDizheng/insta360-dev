<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3.5-27B Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a; --bg-secondary: #141414; --bg-chat: #1a1a1a;
    --border: #2a2a2a; --text: #e8e8e8; --text-muted: #888;
    --accent: #8b5cf6; --accent-hover: #7c3aed;
    --user-bg: #2d1b69; --user-border: #4c2ea0;
    --think-bg: #1a1a0a; --think-border: #3a3a1a; --think-text: #998;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 14px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
  .header h1 { font-size: 15px; color: var(--text); font-weight: 600; }
  .header-meta { font-size: 11px; color: var(--text-muted); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .header-actions button { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .header-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .search-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); cursor: pointer; user-select: none; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; }
  .search-toggle.active { border-color: #22c55e; color: #22c55e; }
  .search-toggle .dot { width: 6px; height: 6px; border-radius: 50%; background: #666; transition: background 0.2s; }
  .search-toggle.active .dot { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }

  /* Tool usage indicator */
  .tools-indicator { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding: 6px 10px; background: #1a1a0a; border: 1px solid #3a3a1a; border-radius: 6px; font-size: 12px; color: #998; }
  .tools-indicator .icon { font-size: 14px; }

  /* Chat */
  .chat-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .chat-inner { max-width: 800px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 24px; }

  /* Messages */
  .msg-group { display: flex; gap: 12px; }
  .msg-group.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .msg-group.user .msg-avatar { background: var(--user-bg); border: 1px solid var(--user-border); }
  .msg-group.assistant .msg-avatar { background: linear-gradient(135deg, #4c1d95, #7c3aed); }
  .msg-body { max-width: 85%; min-width: 60px; }
  .msg-group.user .msg-body { text-align: right; }
  .msg-content { padding: 12px 16px; border-radius: 16px; line-height: 1.7; font-size: 14px; word-break: break-word; }
  .msg-group.user .msg-content { background: var(--user-bg); border: 1px solid var(--user-border); border-top-right-radius: 4px; color: #f0f0ff; display: inline-block; text-align: left; white-space: pre-wrap; }
  .msg-group.assistant .msg-content { background: var(--bg-chat); border: 1px solid var(--border); border-top-left-radius: 4px; }

  /* Markdown inside assistant messages */
  .msg-group.assistant .msg-content p { margin: 0 0 12px 0; }
  .msg-group.assistant .msg-content p:last-child { margin-bottom: 0; }
  .msg-group.assistant .msg-content h1, .msg-group.assistant .msg-content h2, .msg-group.assistant .msg-content h3 {
    margin: 16px 0 8px 0; color: #f0f0f0; }
  .msg-group.assistant .msg-content h2 { font-size: 16px; }
  .msg-group.assistant .msg-content h3 { font-size: 14px; }
  .msg-group.assistant .msg-content ul, .msg-group.assistant .msg-content ol {
    margin: 8px 0; padding-left: 24px; }
  .msg-group.assistant .msg-content li { margin: 4px 0; }
  .msg-group.assistant .msg-content strong { color: #f0f0f0; }
  .msg-group.assistant .msg-content a { color: var(--accent); text-decoration: none; }

  /* Code blocks */
  .msg-group.assistant .msg-content pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 0; margin: 12px 0; overflow: hidden; position: relative; }
  .msg-group.assistant .msg-content pre code { display: block; padding: 16px; font-size: 13px; line-height: 1.5; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; overflow-x: auto; }
  .msg-group.assistant .msg-content code:not(pre code) {
    background: #2a2a3a; padding: 2px 6px; border-radius: 4px; font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', monospace; }

  /* Tables */
  .msg-group.assistant .msg-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
  .msg-group.assistant .msg-content th { background: #1e1e2e; padding: 8px 12px; border: 1px solid var(--border); text-align: left; font-weight: 600; }
  .msg-group.assistant .msg-content td { padding: 8px 12px; border: 1px solid var(--border); }
  .msg-group.assistant .msg-content tr:nth-child(even) { background: #141420; }

  /* Blockquote */
  .msg-group.assistant .msg-content blockquote { border-left: 3px solid var(--accent); margin: 12px 0; padding: 4px 16px; color: var(--text-muted); }

  /* Think blocks */
  .think-block { margin: 0 0 12px 0; border: 1px solid var(--think-border); border-radius: 8px; background: var(--think-bg); overflow: hidden; }
  .think-toggle { display: flex; align-items: center; gap: 6px; padding: 8px 12px; cursor: pointer; color: var(--think-text); font-size: 12px; user-select: none; transition: background 0.2s; }
  .think-toggle:hover { background: #222210; }
  .think-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
  .think-toggle.open .arrow { transform: rotate(90deg); }
  .think-body { padding: 8px 12px 12px; color: var(--think-text); font-size: 13px; line-height: 1.6; display: none; border-top: 1px solid var(--think-border); white-space: pre-wrap; }
  .think-body.show { display: block; }

  /* Meta line */
  .msg-meta { font-size: 11px; color: #444; margin-top: 6px; padding: 0 4px; }

  /* Input area */
  .input-area { padding: 16px; background: var(--bg-secondary); border-top: 1px solid var(--border); }
  .input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap textarea { flex: 1; background: var(--bg-chat); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 24px; max-height: 150px; line-height: 1.5; transition: border-color 0.2s; }
  .input-wrap textarea:focus { border-color: var(--accent); }
  .input-wrap textarea::placeholder { color: #555; }
  .input-wrap button { background: var(--accent); border: none; border-radius: 12px; width: 44px; height: 44px; color: white; font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .input-wrap button:hover { background: var(--accent-hover); transform: scale(1.05); }
  .input-wrap button:disabled { background: #333; cursor: not-allowed; transform: none; }
  .input-hint { text-align: center; font-size: 11px; color: #444; margin-top: 8px; }

  /* Typing indicator */
  .typing-dots { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing-dots span { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; gap: 12px; }
  .empty-state .logo { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-dot"></div>
    <h1>Qwen3.5-27B · Opus Distill</h1>
    <span class="header-meta">vLLM · 4×H20</span>
  </div>
  <div class="header-actions">
    <div class="search-toggle" id="searchToggle" onclick="toggleSearch()">
      <span class="dot"></span> Web Search
    </div>
    <button onclick="clearChat()">New Chat</button>
  </div>
</div>

<div class="chat-container" id="chat">
  <div class="chat-inner" id="chatInner">
    <div class="empty-state" id="emptyState">
      <div class="logo">Q</div>
      <p>Ask me anything</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Message Qwen... (Enter to send)" autofocus></textarea>
    <button id="send" onclick="sendMessage()">↑</button>
  </div>
  <div class="input-hint">Shift+Enter for new line</div>
</div>

<script>
const API_HOST = window.location.hostname === '' || window.location.protocol === 'file:'
  ? 'http://8.211.22.21:8094'
  : window.location.origin;
const API_CHAT = API_HOST + '/v1/chat/completions';
const API_SEARCH = API_HOST + '/api/chat';
const MODEL = 'qwen3.5-27b-opus';
let history = [];
let isStreaming = false;
let searchEnabled = false;

function toggleSearch() {
  searchEnabled = !searchEnabled;
  const el = document.getElementById('searchToggle');
  el.classList.toggle('active', searchEnabled);
}

marked.setOptions({
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

const chatInner = document.getElementById('chatInner');
const chatBox = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const emptyState = document.getElementById('emptyState');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 150) + 'px';
});

function scrollToBottom() {
  chatBox.scrollTop = chatBox.scrollHeight;
}

function renderMarkdown(text) {
  return marked.parse(text);
}

function processThinkBlocks(text) {
  let hasThink = false;
  let thinkContent = '';
  let mainContent = text;

  if (text.includes('</think>')) {
    hasThink = true;
    const parts = text.split('</think>');
    thinkContent = parts[0].replace(/<think>/g, '').trim();
    mainContent = parts.slice(1).join('').trim();
  } else if (text.includes('<think>')) {
    hasThink = true;
    thinkContent = text.replace(/<think>/g, '').trim();
    mainContent = '';
  }

  return { hasThink, thinkContent, mainContent };
}

function createMsgGroup(role) {
  if (emptyState) emptyState.style.display = 'none';

  const group = document.createElement('div');
  group.className = `msg-group ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : 'Q';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const content = document.createElement('div');
  content.className = 'msg-content';
  body.appendChild(content);

  group.appendChild(avatar);
  group.appendChild(body);
  chatInner.appendChild(group);
  scrollToBottom();

  return { group, body, content };
}

function renderAssistantContent(container, fullText) {
  const { hasThink, thinkContent, mainContent } = processThinkBlocks(fullText);
  let html = '';

  if (hasThink && thinkContent) {
    const id = 'think-' + Date.now();
    html += `<div class="think-block">
      <div class="think-toggle open" onclick="toggleThink('${id}', this)">
        <span class="arrow">▶</span> Thought process
      </div>
      <div class="think-body show" id="${id}">${thinkContent.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    </div>`;
  }

  if (mainContent) {
    html += renderMarkdown(mainContent);
  } else if (!hasThink) {
    html += '<p style="color:#666;font-style:italic;">（empty response）</p>';
  }

  container.innerHTML = html;
  container.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

window.toggleThink = function(id, el) {
  const body = document.getElementById(id);
  body.classList.toggle('show');
  el.classList.toggle('open');
};

function clearChat() {
  history = [];
  chatInner.innerHTML = `<div class="empty-state" id="emptyState"><div class="logo">Q</div><p>Ask me anything</p></div>`;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  const userMsg = createMsgGroup('user');
  userMsg.content.textContent = text;
  userMsg.content.style.whiteSpace = 'pre-wrap';
  history.push({ role: 'user', content: text });

  const assistantMsg = createMsgGroup('assistant');
  assistantMsg.content.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

  const t0 = performance.now();
  let fullText = '';
  let tokenCount = 0;

  try {
    if (searchEnabled) {
      const res = await fetch(API_SEARCH, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, enable_search: true }),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
      }

      const contentType = res.headers.get('content-type') || '';

      if (contentType.includes('application/json')) {
        const data = await res.json();
        fullText = data.content || '';
        if (data.tools_used && data.tools_used.length > 0) {
          const indicator = document.createElement('div');
          indicator.className = 'tools-indicator';
          const toolNames = data.tools_used.map(t => {
            if (t.tool === 'web_search') return '🔍 Searched: ' + (t.args.query || '');
            if (t.tool === 'get_current_time') return '🕐 Checked time';
            return '🔧 ' + t.tool;
          }).join(' → ');
          indicator.innerHTML = toolNames;
          assistantMsg.body.insertBefore(indicator, assistantMsg.content);
        }
        renderAssistantContent(assistantMsg.content, fullText);
        tokenCount = Math.round(fullText.length / 1.5);
      } else {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let lastRender = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
            try {
              const data = JSON.parse(line.slice(6));
              const delta = data.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                tokenCount++;
                const now = Date.now();
                if (now - lastRender > 80) {
                  renderAssistantContent(assistantMsg.content, fullText);
                  scrollToBottom();
                  lastRender = now;
                }
              }
            } catch {}
          }
        }
        renderAssistantContent(assistantMsg.content, fullText);
      }
    } else {
      const res = await fetch(API_CHAT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: MODEL,
          messages: history,
          max_tokens: 4096,
          temperature: 0.6,
          stream: true,
        }),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let lastRender = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
          try {
            const data = JSON.parse(line.slice(6));
            const delta = data.choices?.[0]?.delta?.content;
            if (delta) {
              fullText += delta;
              tokenCount++;
              const now = Date.now();
              if (now - lastRender > 80) {
                renderAssistantContent(assistantMsg.content, fullText);
                scrollToBottom();
                lastRender = now;
              }
            }
          } catch {}
        }
      }

      if (!fullText && tokenCount === 0) {
        const fallback = await fetch(API_CHAT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: MODEL,
            messages: history,
            max_tokens: 4096,
            temperature: 0.6,
            stream: false,
          }),
        });
        const fbData = await fallback.json();
        fullText = fbData.choices?.[0]?.message?.content || '';
        tokenCount = fbData.usage?.completion_tokens || 0;
      }
      renderAssistantContent(assistantMsg.content, fullText);
    }

    const elapsed = (performance.now() - t0) / 1000;
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = `${elapsed.toFixed(1)}s · ${tokenCount} tokens · ${(tokenCount / elapsed).toFixed(0)} tok/s`;
    assistantMsg.body.appendChild(meta);

    history.push({ role: 'assistant', content: fullText });
  } catch (err) {
    assistantMsg.content.innerHTML = `<p style="color:#f87171;">Error: ${err.message}</p>`;
  }

  scrollToBottom();
  isStreaming = false;
  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
